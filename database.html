<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Database — BlackBytt</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      color: #f0f0f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 48px 24px;
    }

    .wrap {
      width: 100%;
      max-width: 640px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header h1 {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    .header a {
      font-size: 13px;
      color: #555;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color 0.15s;
    }

    .header a:hover { color: #ccc; }

    .meta {
      font-size: 13px;
      color: #444;
    }

    /* File list */
    .file-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .file-row {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #111;
      border: 1px solid #1e1e1e;
      border-radius: 8px;
      padding: 10px 12px;
      transition: border-color 0.15s;
    }

    .file-row:hover { border-color: #2a2a2a; }

    .file-ext {
      width: 34px;
      height: 34px;
      background: #1a1a1a;
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      font-weight: 700;
      color: #555;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      flex-shrink: 0;
    }

    .file-meta { flex: 1; overflow: hidden; }

    .file-name {
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .file-size {
      font-size: 11px;
      color: #555;
      margin-top: 2px;
    }

    .dl-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      color: #ccc;
      font-size: 12px;
      font-weight: 500;
      padding: 6px 12px;
      cursor: pointer;
      text-decoration: none;
      flex-shrink: 0;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }

    .dl-btn:hover {
      background: #222;
      color: #fff;
      border-color: #3a3a3a;
    }

    /* States */
    .state {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 64px 0;
      color: #444;
      font-size: 14px;
    }

    .state svg { opacity: 0.2; }

    .refresh-btn {
      background: none;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      color: #555;
      font-size: 12px;
      padding: 6px 14px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    .refresh-btn:hover { color: #ccc; border-color: #444; }

    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid #2a2a2a;
      border-top-color: #555;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <h1>Database</h1>
      <a href="index.html">
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 16v-8m0 0l-3 3m3-3l3 3"/>
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5"/>
        </svg>
        Upload files
      </a>
    </div>

    <div id="meta" class="meta"></div>
    <div id="content" class="file-list"></div>
  </div>

  <script>
    function ext(name) {
      const p = name.lastIndexOf('.');
      return p >= 0 ? name.slice(p + 1, p + 5) : '—';
    }

    function fmt(n) {
      if (n < 1024) return n + ' B';
      if (n < 1048576) return (n / 1024).toFixed(1) + ' KB';
      return (n / 1048576).toFixed(1) + ' MB';
    }

    function setLoading() {
      document.getElementById('meta').textContent = '';
      document.getElementById('content').innerHTML = `
        <div class="state"><div class="spinner"></div></div>`;
    }

    function setError(msg) {
      document.getElementById('meta').textContent = '';
      document.getElementById('content').innerHTML = `
        <div class="state">
          <svg width="32" height="32" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.2">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M12 9v4m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
          </svg>
          <span>${msg}</span>
          <button class="refresh-btn" onclick="load()">Try again</button>
        </div>`;
    }

    function setEmpty() {
      document.getElementById('meta').textContent = '0 files';
      document.getElementById('content').innerHTML = `
        <div class="state">
          <svg width="32" height="32" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.2">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M3 7h18M3 12h18M3 17h12"/>
          </svg>
          <span>No files uploaded yet</span>
          <a href="index.html" class="refresh-btn" style="text-decoration:none">Upload your first file</a>
        </div>`;
    }

    function render(files) {
      if (!files.length) { setEmpty(); return; }

      document.getElementById('meta').textContent = `${files.length} file${files.length !== 1 ? 's' : ''}`;

      document.getElementById('content').innerHTML = files.map(f => `
        <div class="file-row">
          <div class="file-ext">${ext(f.name)}</div>
          <div class="file-meta">
            <div class="file-name">${f.name}</div>
            <div class="file-size">${fmt(f.size)}</div>
          </div>
          <a class="dl-btn" href="${f.download_url}" download="${f.name}" target="_blank" rel="noopener">
            <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v12m0 0l-4-4m4 4l4-4M4 20h16"/>
            </svg>
            Download
          </a>
        </div>`).join('');
    }

    async function load() {
      setLoading();
      try {
        const res = await fetch('/api/files');
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || `Error ${res.status}`);
        render(data.files);
      } catch (e) {
        setError(e.message);
      }
    }

    load();
  </script>
</body>
</html>
