<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Upload Documents</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      color: #f0f0f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .wrap {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    h1 {
      font-size: 20px;
      font-weight: 600;
      text-align: center;
      letter-spacing: -0.3px;
    }

    p.sub {
      font-size: 13px;
      color: #666;
      text-align: center;
      margin-top: -16px;
    }

    /* Drop zone */
    .dropzone {
      border: 1.5px dashed #2a2a2a;
      border-radius: 10px;
      padding: 48px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      text-align: center;
      position: relative;
    }

    .dropzone:hover, .dropzone.over {
      border-color: #444;
      background: rgba(255,255,255,0.02);
    }

    .dropzone input {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .dropzone svg { opacity: 0.25; }

    .dz-primary {
      font-size: 15px;
      font-weight: 500;
      color: #e0e0e0;
    }

    .dz-secondary {
      font-size: 12px;
      color: #555;
    }

    /* File queue */
    .queue {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .file-row {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #111;
      border: 1px solid #1e1e1e;
      border-radius: 8px;
      padding: 10px 12px;
    }

    .file-ext {
      width: 32px;
      height: 32px;
      background: #1a1a1a;
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      font-weight: 700;
      color: #555;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      flex-shrink: 0;
    }

    .file-meta { flex: 1; overflow: hidden; }

    .file-name {
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .file-size {
      font-size: 11px;
      color: #555;
      margin-top: 2px;
    }

    .file-badge {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 20px;
      flex-shrink: 0;
      font-weight: 500;
    }

    .badge-waiting  { background: #1a1a1a; color: #555; }
    .badge-uploading { background: #1c1700; color: #f59e0b; }
    .badge-done     { background: #0a1f0f; color: #22c55e; }
    .badge-error    { background: #1f0a0a; color: #ef4444; }

    .remove-btn {
      background: none;
      border: none;
      color: #333;
      cursor: pointer;
      padding: 4px;
      line-height: 0;
      flex-shrink: 0;
    }
    .remove-btn:hover { color: #ef4444; }

    /* Upload button */
    button.upload {
      background: #fff;
      color: #000;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      padding: 13px;
      cursor: pointer;
      width: 100%;
      transition: opacity 0.15s;
    }

    button.upload:hover:not(:disabled) { opacity: 0.88; }

    button.upload:disabled {
      opacity: 0.2;
      cursor: not-allowed;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 12px 20px;
      font-size: 13px;
      transition: transform 0.25s ease;
      white-space: nowrap;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.ok  { color: #22c55e; border-color: #0f3a1f; }
    .toast.err { color: #ef4444; border-color: #3a0f0f; }
  </style>
</head>
<body>
  <div class="wrap">
    <div>
      <h1>Upload Documents</h1>
      <p class="sub">Drop your files below and hit Upload</p>
    </div>

    <div class="dropzone" id="dz">
      <input type="file" id="fi" multiple />
      <svg width="36" height="36" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.2">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/>
      </svg>
      <div class="dz-primary">Drag &amp; drop files here</div>
      <div class="dz-secondary">or click to browse &nbsp;·&nbsp; any format, up to 25 MB each</div>
    </div>

    <div class="queue" id="queue"></div>

    <button class="upload" id="btn" onclick="uploadAll()" disabled>Upload</button>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const files = [];

    const dz  = document.getElementById('dz');
    const fi  = document.getElementById('fi');
    const btn = document.getElementById('btn');

    dz.addEventListener('dragover',  e => { e.preventDefault(); dz.classList.add('over'); });
    dz.addEventListener('dragleave', () => dz.classList.remove('over'));
    dz.addEventListener('drop', e => {
      e.preventDefault();
      dz.classList.remove('over');
      add([...e.dataTransfer.files]);
    });
    fi.addEventListener('change', () => { add([...fi.files]); fi.value = ''; });

    function add(incoming) {
      incoming.forEach(f => {
        if (!files.find(x => x.file.name === f.name && x.file.size === f.size))
          files.push({ file: f, status: 'waiting' });
      });
      render();
    }

    function remove(i) { files.splice(i, 1); render(); }

    function ext(name) {
      const p = name.lastIndexOf('.');
      return p >= 0 ? name.slice(p + 1, p + 5) : '—';
    }

    function size(n) {
      if (n < 1024) return n + ' B';
      if (n < 1048576) return (n / 1024).toFixed(1) + ' KB';
      return (n / 1048576).toFixed(1) + ' MB';
    }

    const labels = { waiting: 'Waiting', uploading: 'Uploading…', done: 'Done', error: 'Failed' };

    function render() {
      const q = document.getElementById('queue');
      q.innerHTML = files.map((item, i) => `
        <div class="file-row">
          <div class="file-ext">${ext(item.file.name)}</div>
          <div class="file-meta">
            <div class="file-name">${item.file.name}</div>
            <div class="file-size">${size(item.file.size)}</div>
          </div>
          <span class="file-badge badge-${item.status}">${labels[item.status]}</span>
          ${item.status === 'waiting' ? `
            <button class="remove-btn" onclick="remove(${i})">
              <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
              </svg>
            </button>` : ''}
        </div>`).join('');

      btn.disabled = files.filter(f => f.status === 'waiting').length === 0;
    }

    function toast(msg, type) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.className = `toast show ${type}`;
      setTimeout(() => el.classList.remove('show'), 3500);
    }

    function toBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    async function uploadOne(item) {
      item.status = 'uploading';
      render();

      try {
        const content = await toBase64(item.file);
        const res = await fetch('/api/upload', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ filename: item.file.name, content }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || `Error ${res.status}`);
        item.status = 'done';
      } catch (e) {
        item.status = 'error';
        item.error = e.message;
      }

      render();
    }

    async function uploadAll() {
      btn.disabled = true;
      const pending = files.filter(f => f.status === 'waiting');
      await Promise.all(pending.map(uploadOne));

      const done  = files.filter(f => f.status === 'done').length;
      const errors = files.filter(f => f.status === 'error');

      if (errors.length === 0) {
        toast(`${done} file${done !== 1 ? 's' : ''} uploaded successfully`, 'ok');
      } else {
        toast(`${errors.length} file${errors.length !== 1 ? 's' : ''} failed — check your connection`, 'err');
      }

      render();
    }
  </script>
</body>
</html>
